#ddev-generated
# This addon extends the base ddev-pi addon with Go development capabilities
services:
  pi:
    environment:
      # Go version configuration (check latest: https://go.dev/VERSION?m=text)
      GOLANG_VERSION: ${GOLANG_VERSION:-1.26.4}
      GOLANGCI_LINT_VERSION: ${GOLANGCI_LINT_VERSION:-1.62.2}
      # Go environment variables
      GOPATH: "/home/pi/go"
      GOBIN: "/home/pi/go/bin"
      GO111MODULE: "on"
      GOCACHE: "/home/pi/.cache/go-build"
      GOMODCACHE: "/home/pi/go/pkg/mod"
      # GOTMPDIR: Set to home directory to avoid /tmp noexec restrictions
      GOTMPDIR: "/home/pi/.cache/go-tmp"
